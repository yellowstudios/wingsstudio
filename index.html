<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wings to Fly — Weekly Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    :root{--accent:#c89b3c;--ink:#222;--muted:#777;--line:#e5e5e5;--bg:#fafafa;}
    *{box-sizing:border-box;}
    html,body{width:100%;margin:0;padding:0;background:var(--bg);color:var(--ink);overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px;}
    .toolbar .nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .toolbar button.nav-btn{font:inherit;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 12px;font-size:14px;background:#fff;cursor:pointer;}
    .toolbar button.nav-btn:hover{background:#f0f0f0;}
    .toolbar button.nav-btn:disabled{opacity:.5;cursor:default;}
    .toolbar .week-label{font-weight:600;font-size:16px;}
    .toolbar .tabs{display:flex;gap:8px;flex-wrap:wrap;}
    .toolbar .tabs button{font:inherit;color:var(--muted);font-size:14px;padding:6px 12px;border-radius:6px;border:none;background:none;cursor:pointer;}
    .toolbar .tabs button.active{background:var(--accent);color:#fff;}
    .week-grid{display:none;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;padding:12px;}
    .week-grid.active{display:grid;}
    .day-column{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:120px;display:flex;flex-direction:column;min-width:0;}
    .day-column.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
    .day-header{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;align-items:center;background:#fcfaf5;}
    .day-name{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
    .day-num{font-size:18px;font-weight:600;}
    .day-events{padding:8px;display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;}
    .no-events{color:#bbb;text-align:center;font-size:13px;padding:14px 0;}
    .event-card{border:1px solid var(--line);border-radius:6px;padding:8px;background:#fff;font-size:12px;min-width:0;}
    .event-time{color:var(--muted);font-size:11px;margin-bottom:2px;}
    .event-title{font-weight:600;font-size:13px;margin-bottom:2px;word-wrap:break-word;}
    .event-location{color:var(--muted);font-size:11px;margin-bottom:4px;word-wrap:break-word;}
    .event-meta{display:flex;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap;}
    .event-cost{font-weight:600;color:var(--ink);}
    .event-spots{font-style:italic;}
    .event-register{display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;font-size:12px;font-weight:600;padding:6px 8px;border-radius:5px;}
    .event-register:hover{opacity:.9;}
    .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.5);display:none;align-items:center;justify-content:center;font-size:14px;color:var(--muted);z-index:9999;}
    .loading-overlay.active{display:flex;}
    .top-note{padding:10px 16px 0 16px;font-size:12px;color:var(--muted);}
    @media (max-width:900px){.week-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="top-note">
    Calendar loads from your Google Sheet via Apps Script JSON.
  </div>

  <div class="toolbar">
    <div class="nav">
      <button class="nav-btn" id="prevBtn" type="button">‹ Prev</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="nav-btn" id="nextBtn" type="button">Next ›</button>
    </div>
    <div class="tabs">
      <button id="tab-classes" type="button">Classes &amp; Rehearsals</button>
      <button id="tab-shows" type="button">Shows &amp; Events</button>
    </div>
  </div>

  <div id="grid-classes" class="week-grid"></div>
  <div id="grid-shows" class="week-grid"></div>
  <div class="loading-overlay" id="loadingOverlay">Loading…</div>

  <script>
    // === CONFIG: Replace this with your Apps Script Web App URL ===
    const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby_ddo1StHIwCDZsaKKUDYdpuqK41rsxAYcetgl96omBrrYpn_yVMuVnILNVKu97KwL/exec";

    var STATE = {
      tab: 'classes',
      weekKey: formatDateKey(new Date()),
      data: null
    };

    function formatDateKey(date) {
      const d = new Date(date);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function getMondayOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay(); // 0=Sun, 1=Mon, ... 6=Sat
      const diff = (day === 0) ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function escapeHtml(str) {
      var div = document.createElement("div");
      div.textContent = String(str == null ? "" : str);
      return div.innerHTML;
    }

    function buildGridHtml(events) {
      var byDay = {};
      STATE.data.days.forEach(function(d){ byDay[d.key] = []; });
      events.forEach(function(ev){ if (byDay[ev.dayKey]) byDay[ev.dayKey].push(ev); });

      var html = "";
      STATE.data.days.forEach(function(d) {
        var isToday = d.key === STATE.data.todayKey;
        var dayEvents = byDay[d.key];
        var eventsHtml = "";

        if (dayEvents.length === 0) {
          eventsHtml = '<div class="no-events">—</div>';
        } else {
          dayEvents.forEach(function(ev) {
            eventsHtml += '<div class="event-card">' +
              '<div class="event-time">' + escapeHtml(ev.startTime) + ' – ' + escapeHtml(ev.endTime) + '</div>' +
              '<div class="event-title">' + escapeHtml(ev.title) + '</div>' +
              (ev.location ? '<div class="event-location">' + escapeHtml(ev.location) + '</div>' : "") +
              '<div class="event-meta">' +
                (ev.costText ? '<span class="event-cost">' + escapeHtml(ev.costText) + '</span>' : "") +
                (ev.spotsText ? '<span class="event-spots">' + escapeHtml(ev.spotsText) + '</span>' : "") +
              '</div>' +
              (ev.registrationLink ? '<a class="event-register" href="' + escapeHtml(ev.registrationLink) + '" target="_top" rel="noopener">Register</a>' : "") +
            '</div>';
          });
        }

        html += '<div class="day-column' + (isToday ? " today" : "") + '">' +
          '<div class="day-header"><span class="day-name">' + d.name + '</span><span class="day-num">' + d.num + '</span></div>' +
          '<div class="day-events">' + eventsHtml + '</div>' +
        '</div>';
      });

      return html;
    }

    function render() {
      document.getElementById("weekLabel").textContent = STATE.data.weekLabel;
      document.getElementById("grid-classes").innerHTML = buildGridHtml(STATE.data.classes);
      document.getElementById("grid-shows").innerHTML = buildGridHtml(STATE.data.shows);
      applyTab();
    }

    function applyTab() {
      document.getElementById("grid-classes").classList.toggle("active", STATE.tab === "classes");
      document.getElementById("grid-shows").classList.toggle("active", STATE.tab === "shows");
      document.getElementById("tab-classes").classList.toggle("active", STATE.tab === "classes");
      document.getElementById("tab-shows").classList.toggle("active", STATE.tab === "shows");
    }

    function setLoading(isLoading) {
      document.getElementById("loadingOverlay").classList.toggle("active", isLoading);
      document.getElementById("prevBtn").disabled = isLoading;
      document.getElementById("nextBtn").disabled = isLoading;
    }

    function loadWeek(weekKey) {
      setLoading(true);
      var url = APPS_SCRIPT_WEB_APP_URL + "?calType=" + STATE.tab + "&week=" + weekKey;

      fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error("Network response was not ok");
          return res.json();
        })
        .then(function(data) {
          STATE.data = data;
          STATE.weekKey = weekKey;
          render();
          setLoading(false);
        })
        .catch(function(err) {
          setLoading(false);
          alert("Could not load that week. Please try again.");
          console.error(err);
        });
    }

    document.getElementById("prevBtn").addEventListener("click", function() {
      var prevDate = new Date(STATE.data ? STATE.data.mondayKey : new Date());
      prevDate.setDate(prevDate.getDate() - 7);
      loadWeek(formatDateKey(prevDate));
    });

    document.getElementById("nextBtn").addEventListener("click", function() {
      var nextDate = new Date(STATE.data ? STATE.data.mondayKey : new Date());
      nextDate.setDate(nextDate.getDate() + 7);
      loadWeek(formatDateKey(nextDate));
    });

    document.getElementById("tab-classes").addEventListener("click", function() {
      STATE.tab = "classes";
      applyTab();
      if (STATE.data) loadWeek(STATE.weekKey);
    });

    document.getElementById("tab-shows").addEventListener("click", function() {
      STATE.tab = "shows";
      applyTab();
      if (STATE.data) loadWeek(STATE.weekKey);
    });

    // Initial load
    loadWeek(STATE.weekKey);
  </script>
</body>
</html>
